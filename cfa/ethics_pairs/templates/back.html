<!-- CFA Ethics Minimal-Pair — BACK (answer) template (multi-span flagship).
     This side deliberately contains NO Standard/Rationale text in its markup, so pressing Anki's
     built-in "Show Answer" BEFORE completing the attempt can never leak the answer. Its job is to
     commit the deterministic grade the front computed (read from localStorage) and — once the attempt
     is genuinely complete — to REVEAL the governing Standard + rationale + the per-span evidence
     breakdown (the same learning payload the checked front shows). This closes the reflexive-path
     dead-end where the prominent "Show answer" used to say "Attempt not completed" even after a
     complete attempt. On desktop (pycmd present) it auto-rates Good/Again; on mobile it shows the
     recommended rating and the learner taps it. -->

<div class="cfa-commit" id="cfa-commit" data-pairid="{{PairId}}">
  <div class="big muted" id="cfa-commit-title">Recording…</div>
  <div class="muted" id="cfa-commit-sub"></div>
  <div class="cfa-commit-reveal" id="cfa-commit-reveal" hidden></div>
</div>

<script>
(function () {
  var root = document.getElementById("cfa-commit");
  var title = document.getElementById("cfa-commit-title");
  var sub = document.getElementById("cfa-commit-sub");
  var payload = document.getElementById("cfa-commit-reveal");
  var backPairId = (root && root.dataset.pairid ? root.dataset.pairid : "").trim();
  var pending = null;
  try { pending = JSON.parse(localStorage.getItem("cfaEthics:pending") || "null"); } catch (e) {}

  // Only honor a pending grade that marks a genuinely completed attempt for THIS card. A missing
  // grade (built-in Show Answer before completing) or a stale grade from another card is withheld,
  // exactly as before — the Standard is never shown without a real attempt. (pairId/itemId aliases.)
  var pendingId = pending && (pending.pairId || pending.itemId);
  var completed = !!(pending && pending.completed &&
    (!pendingId || !backPairId || pendingId === backPairId));

  if (!completed) {
    title.className = "big no";
    title.textContent = "Attempt not completed";
    sub.textContent =
      "The governing Standard is shown only after you judge both cases and highlight the decisive phrase(s). Rate Again to redo this pair.";
    return;
  }

  try { localStorage.removeItem("cfaEthics:pending"); } catch (e) {}
  var correct = !!pending.correct;
  var verdictsOK = allCaseVerdictsOK(pending);
  title.className = "big " + (correct ? "ok" : (verdictsOK ? "warn" : "no"));
  title.textContent = correct
    ? "✓ Recorded: fully correct"
    : (verdictsOK ? "✓ Recorded: case verdicts right, evidence not complete" : "✗ Recorded: case verdict needs review");

  // The learning payload — reveal the governing Standard + rationale (and the per-span evidence
  // breakdown) so the reflexive "Show answer" is never a dead-end. Mirrors the checked front reveal.
  payload.innerHTML = buildPayloadHtml(pending);
  payload.hidden = false;

  if (typeof pycmd !== "undefined") {
    sub.textContent = "Scheduling…";
    setTimeout(function () { pycmd(correct ? "ease3" : "ease1"); }, 350);
  } else {
    sub.textContent = "Rate " + (correct ? "Good" : "Again") + " to record this attempt.";
  }

  function esc(s) {
    return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function cap(s) { s = (s || "").toString(); return s.charAt(0).toUpperCase() + s.slice(1); }
  function allCaseVerdictsOK(p) {
    var vs = (p && p.verdicts) || {};
    return !!(vs.A && vs.B && vs.A.ok && vs.B.ok);
  }

  function buildPayloadHtml(p) {
    var html = "";
    // Verdicts + evidence summary (mirrors the front reveal breakdown, incl. near matches).
    var vs = p.verdicts || {};
    if (vs.A || vs.B) {
      html += '<ul class="cfa-breakdown"><li>Case verdicts: A answer <b>' +
        esc((vs.A && vs.A.answer) || "") + "</b>, your verdict <b>" +
        esc((vs.A && vs.A.judged) || "none") + "</b> " +
        ((vs.A && vs.A.ok) ? "\u2713" : "\u2717") + "; B answer <b>" +
        esc((vs.B && vs.B.answer) || "") + "</b>, your verdict <b>" +
        esc((vs.B && vs.B.judged) || "none") + "</b> " +
        ((vs.B && vs.B.ok) ? "\u2713" : "\u2717") + "</li>";
      if (typeof p.found === "number" && typeof p.total === "number") {
        html += "<li>Evidence: " + p.found + " of " + p.total + " decisive phrases fully found" +
          (p.near ? " (+" + p.near + " near)" : "") +
          (p.highlight ? " \u00b7 " + esc(cap(p.highlight)) : "") + "</li>";
      }
      html += "</ul>";
    }
    // Per-span evidence breakdown: ✓ full match, ~ near (materially-overlapping) match, ✗ missed.
    if (p.spans && p.spans.length) {
      html += '<ul class="cfa-span-detail">';
      for (var i = 0; i < p.spans.length; i++) {
        var sp = p.spans[i] || {};
        var tier = sp.tier || (sp.matched ? "full" : "none");
        var mk = tier === "full" ? "\u2713" : (tier === "near" ? "~" : "\u2717");
        var cls = tier === "full" ? "found" : (tier === "near" ? "near" : "missed");
        html += '<li><span class="' + cls + '">' + mk + "</span> " +
          '<span class="cfa-span-quote">' + esc(sp.phrase) + "</span>" +
          (sp.rationale ? " \u2014 " + esc(sp.rationale) : "") + "</li>";
      }
      html += "</ul>";
    }
    // The governing Standard + overall rationale — the core learning payload (named source if AI).
    if (p.standard) {
      var srcLabel = p.source === "ai" ? "Graded by AI \u00b7 " : "";
      html += '<div class="cfa-standard"><span class="cfa-badge">Governing Standard</span>' + esc(srcLabel) + esc(p.standard) + "</div>";
    }
    if (p.rationale) {
      html += '<div class="cfa-rationale">' + esc(p.rationale) + "</div>";
    }
    if (p.ai) {
      var ai = p.ai || {};
      var needed = ai.neededEvidence || [];
      var neededHtml = "";
      for (var n = 0; n < needed.length; n++) {
        if (needed[n]) neededHtml += "<li>" + esc(needed[n]) + "</li>";
      }
      var precision = (ai.evidencePrecision || "").toString().replace(/_/g, " ");
      html += '<div class="cfa-ai">' +
        '<div class="cfa-ai-head"><span class="cfa-badge cfa-ai-badge">AI feedback</span>' +
          (ai.grade ? "Semantic grade: " + esc(cap(ai.grade)) : "Graded by AI") + "</div>" +
        (ai.learnerIntent ? '<div class="cfa-ai-intent"><b>What you likely noticed:</b> ' + esc(ai.learnerIntent) + "</div>" : "") +
        (precision ? '<div class="cfa-ai-precision"><b>Evidence precision:</b> ' + esc(precision) + "</div>" : "") +
        (ai.explanation ? '<div class="cfa-ai-explain">' + esc(ai.explanation) + "</div>" : "") +
        (ai.coaching ? '<div class="cfa-ai-coach">' + esc(ai.coaching) + "</div>" : "") +
        (neededHtml ? '<div class="cfa-ai-needed"><b>Needed evidence:</b><ul>' + neededHtml + "</ul></div>" : "") +
        (ai.studyTip ? '<div class="cfa-ai-tip"><b>Study tip:</b> ' + esc(ai.studyTip) + "</div>" : "") +
        "</div>";
    }
    return html;
  }
})();
</script>
