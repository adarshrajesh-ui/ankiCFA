# openai is the OPTIONAL SDK for the CFA AI features (cfa/ai/llm_client.py). It
# is declared only in cfa/ai/requirements.txt, is not installed in the type-check
# venv, and is imported inside a try/except ImportError (AI-off deterministic
# fallback), so type-checking must not require its stubs.
[mypy-openai]
ignore_missing_imports = True
[mypy-openai.*]
ignore_missing_imports = True
# CFA fork: first-party helper modules that are loaded by BARE name after a
# runtime `sys.path.insert(0, ...)` (e.g. qt/aqt/cfa_seed.py adds cfa/ethics_pairs
# to sys.path, and the tools/cfa proof scripts import a sibling from their own
# dir). mypy cannot follow runtime sys.path edits. These dirs are deliberately
# NOT added as mypy roots: tools/cfa is already type-checked as the `tools.cfa.*`
# package (adding it as a root triggers a "source file found twice" clash), and
# rooting cfa/ethics_pairs would pull out-of-scope proof scripts into the checked
# graph. A targeted per-module ignore clears the import-not-found noise without
# blanket-silencing type errors or widening the check:mypy target's folder scope.
[mypy-ethics_scoring]
ignore_missing_imports = True
[mypy-ai_grading]
ignore_missing_imports = True
[mypy-passages]
ignore_missing_imports = True
[mypy-import_pairs]
ignore_missing_imports = True
[mypy-build_cfa_deck]
ignore_missing_imports = True
