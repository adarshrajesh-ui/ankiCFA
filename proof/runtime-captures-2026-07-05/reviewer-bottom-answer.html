<style id="cfa-chrome-reviewer-bottom">
  html, body {
    background: #E4F6F5 !important;
    color: #122B46;
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  #outer {
    border-top: 1px solid #DDEDEA !important;
    background: rgba(255, 255, 255, .94);
    box-shadow: 0 -12px 30px rgba(18, 43, 70, .06);
    padding: 6px 14px 8px;
  }
  #innertable {
    max-width: 980px;
    margin: 0 auto;
  }
  /* Edit / More — quiet text buttons, not native gray chrome. */
  .stat button {
    background: transparent !important;
    border: none !important;
    color: #4D5C6D !important;
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-weight: 600;
  }
  .stat button:hover { color: #14B8B1 !important; }
  /* Rating chips + Show Answer — one rounded CFA pill shape. */
  #middle button, #ansbut {
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-weight: 600;
    border-radius: 100px;
    border: 1px solid #DDEDEA;
    background: #FBFAF5;
    color: #122B46;
    padding: 8px 20px;
  }
  #middle button:hover {
    border-color: #14B8B1;
    color: #14B8B1;
    background: #DFF5F3;
  }
  /* Show Answer — the single navy primary pill CTA. */
  #ansbut, #ansbut:hover {
    background: #14B8B1 !important;
    color: #FBFAF5 !important;
    border-color: #14B8B1 !important;
  }
  #ansbut:hover { background: #0E9C97 !important; }
  /* Recommended/default answer — filled navy pill so the eye is guided. */
  #defease, #defease:hover {
    background: #14B8B1 !important;
    color: #FBFAF5 !important;
    border-color: #14B8B1 !important;
  }
  #defease:hover { background: #0E9C97 !important; }
  /* "Again" (ease 1) — a quiet caution border, unless it is the default. */
  #middle button[data-ease="1"]:not(#defease) {
    border-color: #b91c1c;
    color: #b91c1c;
  }
  #middle button[data-ease="1"]:not(#defease):hover {
    border-color: #b91c1c;
    color: #b91c1c;
    background: #fef2f2;
  }
  /* Interval labels + remaining-count stay quiet. */
  .nobold, .stattxt { color: #8B97A4; }
  .new-count { color: #122B46; }
  @media (max-width: 640px) {
    #outer {
      padding: 8px 8px calc(10px + env(safe-area-inset-bottom, 0px));
    }
    #innertable,
    #innertable > tbody,
    #innertable > tbody > tr {
      display: block;
      width: 100%;
    }
    #innertable > tbody > tr {
      display: grid;
      grid-template-columns: minmax(62px, .72fr) minmax(0, 2fr) minmax(62px, .72fr);
      align-items: end;
      gap: 6px;
    }
    #middle {
      min-width: 0;
    }
    #middle > center,
    #middle > table,
    #middle table {
      width: 100%;
    }
    #middle table,
    #middle tbody,
    #middle tr {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }
    #middle td[align=center] {
      flex: 1 1 calc(50% - 6px);
      min-width: 0;
      padding-top: 14px !important;
    }
    #middle button,
    #ansbut {
      width: 100%;
      min-height: 46px;
      margin: 0;
      padding: 9px 10px;
      box-sizing: border-box;
    }
    #ansbut {
      min-height: 50px;
    }
    #ansbut .stattxt {
      width: max-content;
      max-width: 72vw;
    }
    .stat {
      display: block !important;
      padding-top: 4px;
    }
    .stat button {
      width: 100%;
      min-width: 0;
      min-height: 42px;
      margin: 0;
      padding: 8px 6px;
      font-size: .78rem;
    }
    .nobold,
    .stattxt {
      font-size: .68rem;
    }
  }
</style></head><body><center id=outer><table id=innertable width=100% cellspacing=0 cellpadding=0><tr><td align=start valign=top class=stat><button onclick="pycmd('edit');">Edit</button></td><td align=center valign=top id=middle><center><table cellpadding=0 cellspacing=0><tr><td align=center><button data-ease="1" onclick='pycmd("ease1");'>Again<span class="nobold">&lt;1m</span></button></td><td align=center><button data-ease="2" onclick='pycmd("ease2");'>Hard<span class="nobold">8m</span></button></td><td align=center><button id="defease" data-ease="3" onclick='pycmd("ease3");'>Good<span class="nobold">1d</span></button></td><td align=center><button data-ease="4" onclick='pycmd("ease4");'>Easy<span class="nobold">4d</span></button></td></tr></table></center></td><td align=end valign=top class=stat><button onclick="pycmd('more');">More &#9662;<span id=time class=stattxt></span></button></td></tr></table></center></body></html>
