<!DOCTYPE html>
<!--
D-P4-4 proof harness. Reproduces the EXACT desktop concept-map structure — a
focusable role="button" tabindex=0 node inside the map SVG — under BOTH the old
role="img" container and the shipped role="group" container, side by side, so the
browser accessibility tree shows the difference. Pixels are identical between the
two; the fix is entirely in what the a11y tree exposes, which is why the honest
artifact here is the a11y snapshot, not a screenshot.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>D-P4-4 — concept-map SVG role (img prunes focusable nodes; group exposes them)</title>
<style>
  body { font-family: "IBM Plex Sans", system-ui, sans-serif; margin: 24px; color: #122b46; }
  h1 { font-size: 18px; } h2 { font-size: 14px; margin: 18px 0 6px; }
  .cols { display: flex; gap: 40px; }
  figcaption { font-size: 12px; color: #68707d; max-width: 320px; }
  .bad { color: #b42318; } .good { color: #0e9c97; }
</style>
</head>
<body>
  <h1>D-P4-4 — the map SVG must not be <code>role="img"</code> over focusable node buttons</h1>

  <div class="cols">
    <figure>
      <h2 class="bad">BEFORE — role="img" (spec default)</h2>
      <!-- role="img" flattens the SVG to one presentational image: the focusable
           node button below is pruned from the accessibility tree. -->
      <svg id="before" viewBox="0 0 200 120" width="200" height="120"
           role="img" aria-label="Interactive CFA concept mastery map">
        <g role="button" tabindex="0" aria-label="Ethics: 63% mastered">
          <circle cx="100" cy="60" r="34" fill="#31cfc7" stroke="#bfe4e1" />
          <text x="100" y="65" text-anchor="middle" fill="#fff" font-size="12">Ethics</text>
        </g>
      </svg>
      <figcaption>The node is <b>focusable</b> (Tab reaches it) but under
        <code>role="img"</code> screen readers expose only one "image", so the
        button and its "Ethics: 63% mastered" name are <b>orphaned</b>.</figcaption>
    </figure>

    <figure>
      <h2 class="good">AFTER — role="group" (shipped)</h2>
      <svg id="after" viewBox="0 0 200 120" width="200" height="120"
           role="group" aria-label="Interactive CFA concept mastery map">
        <g role="button" tabindex="0" aria-label="Ethics: 63% mastered">
          <circle cx="100" cy="60" r="34" fill="#31cfc7" stroke="#bfe4e1" />
          <text x="100" y="65" text-anchor="middle" fill="#fff" font-size="12">Ethics</text>
        </g>
      </svg>
      <figcaption>Same pixels. The <code>role="group"</code> keeps the map's
        accessible name AND exposes the focusable node <b>button</b>
        ("Ethics: 63% mastered") to screen readers.</figcaption>
    </figure>
  </div>
</body>
</html>
