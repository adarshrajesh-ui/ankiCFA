<!doctype html><html><head><meta charset="utf-8"><style>
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#eef0f3;padding:24px;color:#1a1a1a}
  h2{font:600 13px/1 sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#68707d;margin:0 0 12px}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .panel{border-radius:8px;padding:20px;min-height:260px}
  /* BEFORE: stock Anki blue tokens */
  .before{--button-primary-bg:#3b82f6;--border-focus:#3b82f6;--fg-link:#1d4ed8;--selected-bg:rgba(147,197,253,.5);background:#ffffff}
  /* AFTER: CFA tokens (matches ChangeNotetypePage .cfa-changenote.is-light overrides) */
  .after{--button-primary-bg:#122b46;--border-focus:#da5c01;--fg-link:#da5c01;--selected-bg:#fcebda;background:#fafbfd}
  .eyebrow{font:600 12px/1 sans-serif;letter-spacing:.09em;text-transform:uppercase;color:#da5c01;margin-bottom:14px}
  .sec-title{font:600 17px/1.3 Georgia,serif;color:#122b46;border-bottom:1px solid #e3e7ec;padding-bottom:6px;margin:16px 0 12px}
  .selrow{background:var(--selected-bg);border-radius:6px;padding:9px 12px;font-size:13px;border:1px solid var(--border-focus)}
  .map{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px;color:#3a4553}
  select{padding:6px 8px;border:1px solid #cdd3da;border-radius:4px;outline:none;flex:1}
  select.focused{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--border-focus)}
  .save{background:var(--button-primary-bg);color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}
  a{color:var(--fg-link);font-size:13px;text-decoration:none}
</style></head><body>
<div class="wrap">
  <div class="panel before">
    <h2>Before — stock Anki</h2>
    <div class="selrow">Change notetype: <b>Basic</b> → <b>CFA Knowledge</b></div>
    <div class="sec-title" style="color:#1a1a1a;font-family:sans-serif">Fields</div>
    <div class="map"><span>Front</span><select class="focused"><option>Front</option></select></div>
    <div class="map"><span>Back</span><select><option>Back</option></select></div>
    <div class="sec-title" style="color:#1a1a1a;font-family:sans-serif">Templates</div>
    <div class="map"><span>Card 1</span><select><option>Card 1</option></select></div>
    <button class="save">Save</button> &nbsp; <a href="#">Learn more</a>
  </div>
  <div class="panel after">
    <div class="eyebrow">ankiCFA · Level II · Change notetype</div>
    <h2>After — CFA design system</h2>
    <div class="selrow">Change notetype: <b>Basic</b> → <b>CFA Knowledge</b></div>
    <div class="sec-title">Fields</div>
    <div class="map"><span>Front</span><select class="focused"><option>Front</option></select></div>
    <div class="map"><span>Back</span><select><option>Back</option></select></div>
    <div class="sec-title">Templates</div>
    <div class="map"><span>Card 1</span><select><option>Card 1</option></select></div>
    <button class="save">Save</button> &nbsp; <a href="#">Learn more</a>
  </div>
</div>
</body></html>
