<!doctype html><html><head><meta charset=utf-8><title>Reviewer body — CFA chrome (after)</title><style>
  html, body { margin: 0; background: #ffffff; color: #2a2a2a;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  #qa { text-align: center; padding: 40px 20px; }
  .card { font-size: 20px; }
  .typeGood { background: #afa; color: black; }
  .typeBad  { background: #faa; color: black; }
  .typeMissed { background: #ccc; color: black; }
  .type { font-size: 22px; letter-spacing: .02em; }
  .type span { padding: 0 1px; border-radius: 2px; }
</style>
<style id="cfa-chrome-reviewer">
  html, body {
    min-height: 100%;
  }
  body:not(.nightMode) {
    background:
      radial-gradient(circle at 12% 0%, rgba(255,255,255,.96), transparent 23rem),
      radial-gradient(circle at 86% 8%, rgba(20,184,177,.22), transparent 28rem),
      radial-gradient(circle at 56% 70%, rgba(5,59,69,.16), transparent 34rem),
      linear-gradient(135deg, #FBFAF5 0%, #EEF9F7 42%, #D8F3EF 64%, rgba(5,59,69,.24) 100%) !important;
    color: #122B46;
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  body:not(.nightMode)::before {
    content: "ankiCFA · Review mode";
    display: block;
    box-sizing: border-box;
    width: min(1040px, calc(100vw - 48px));
    margin: 22px auto -10px;
    padding: 0 4px;
    color: #14B8B1;
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  body:not(.nightMode) #qa {
    box-sizing: border-box;
    width: min(1040px, calc(100vw - 48px));
    min-height: min(58vh, 520px);
    margin: 26px auto 22px;
    padding: clamp(12px, 3vw, 28px);
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    text-align: left;
  }
  body.nightMode #qa {
    box-sizing: border-box;
    width: min(1040px, calc(100vw - 48px));
    margin: 26px auto 22px;
    padding: clamp(28px, 5vw, 54px);
    border: 1px solid #2b323b;
    border-radius: 28px;
  }
  #qa .cfa-basic-review-card {
    max-width: 860px;
    margin: 0 auto;
    padding: clamp(30px, 5vw, 46px);
    background: linear-gradient(135deg, rgba(255,255,255,.84), rgba(255,255,255,.50));
    border: 1px solid rgba(255,255,255,.72);
    border-radius: 34px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.78), 0 28px 90px rgba(5,59,69,.16);
    backdrop-filter: blur(22px) saturate(1.18);
    -webkit-backdrop-filter: blur(22px) saturate(1.18);
    color: #122B46;
    line-height: 1.62;
  }
  .nightMode #qa .cfa-basic-review-card {
    color: #e8ecf1;
  }
  #qa .cfa-basic-review-eyebrow {
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #14B8B1;
    margin-bottom: 16px;
  }
  #qa .cfa-basic-review-content {
    font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
    font-size: 1.38rem;
    line-height: 1.34;
    color: #122B46;
  }
  .nightMode #qa .cfa-basic-review-content {
    color: #f2f5f8;
  }
  #qa .cfa-basic-review-card--answer .cfa-basic-review-content {
    font-family: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 1.02rem;
    line-height: 1.68;
  }
  #qa .cfa-basic-review-card hr#answer,
  #qa .cfa-basic-review-card #answer {
    border: none;
    border-top: 1px solid #DDEDEA;
    margin: 22px 0;
  }
  /* Type-in-answer diff — CFA pass / fail / neutral washes, brand-ink text,
     replacing the stock bright-green / bright-red / grey traffic-light blocks. */
  .typeGood {
    background: #f0fdf4 !important;
    color: #122B46 !important;
  }
  .typeBad {
    background: #fef2f2 !important;
    color: #122B46 !important;
  }
  .typeMissed {
    background: #DDEDEA !important;
    color: #4D5C6D !important;
  }
  @media (max-width: 640px) {
    body:not(.nightMode)::before {
      width: calc(100vw - 24px);
      margin: 12px auto -8px;
      padding: 0;
    }
    body:not(.nightMode) #qa,
    body.nightMode #qa {
      width: calc(100vw - 16px);
      min-height: auto;
      margin: 14px auto 12px;
      padding: 8px;
    }
    #qa .cfa-basic-review-card {
      padding: 22px 18px;
      border-radius: 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.78), 0 18px 54px rgba(5,59,69,.16);
    }
    #qa .cfa-basic-review-eyebrow {
      margin-bottom: 12px;
    }
    #qa .cfa-basic-review-content {
      font-size: 1.18rem;
      line-height: 1.38;
    }
    #qa .cfa-basic-review-card--answer .cfa-basic-review-content {
      font-size: .98rem;
      line-height: 1.62;
    }
  }
</style></head><body>
  <div id="qa" dir="auto">
    <div class="cfa-basic-review-card cfa-basic-review-card--question"><div class="cfa-basic-review-eyebrow">ankiCFA · Level II · Question</div><div class="cfa-basic-review-content">
<div class="card">
  <p>Name the three factors in the Fama-French model.</p>
  <div class="type">
    <span class="typeGood">Mkt</span><span class="typeBad">x</span><span class="typeMissed">SMB</span>
  </div>
</div>
</div></div>
  </div>
</body></html>
