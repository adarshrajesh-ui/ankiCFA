<!doctype html><html><head><meta charset="utf-8">
<style>
  :root{
    --canvas:#fff; --fg:#202020; --border:#d7d7d7; --border-subtle:#e4e4e4;
    --canvas-elevated:#fff;
    /* CFA tokens (parity with _tokens.scss) */
    --cfa-page:#fafbfd; --cfa-surface:#f3f6f8; --cfa-line:#e7e9ec;
    --cfa-ink:#122b46; --cfa-accent:#da5c01; --cfa-muted:#4d5c6d; --cfa-mm-green:#0b7a5b;
    --cfa-serif:"Source Serif 4",Georgia,serif; --cfa-body:"IBM Plex Sans",-apple-system,Arial,sans-serif;
  }
  body{margin:0;font-family:var(--cfa-body);background:#e9edf2;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  h2.cap{grid-column:1/3;margin:0 0 4px;font-family:var(--cfa-serif);color:#122b46}
  .frame{border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)}
  .tag{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;color:#fff}
  .tag.b{background:#6b7280}.tag.a{background:#da5c01}

  /* stock */
  .stock{background:var(--canvas);color:var(--fg);min-height:340px}
  .stock .range{position:sticky;top:0;background:var(--canvas);border-bottom:1px solid var(--border);padding:10px;font-size:13px}
  .stock .card{margin:14px;background:var(--canvas-elevated);border:1px solid var(--border-subtle);border-radius:10px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .stock .card h1{margin:0 0 6px;font-size:18px;border-bottom:1px solid var(--border);padding-bottom:6px}
  .stock input[type=radio]{accent-color:#3b82f6}

  /* CFA */
  .cfa{background:var(--cfa-page);color:var(--cfa-ink);min-height:340px}
  .cfa .head{margin:16px 0 8px 12px}
  .cfa .eyebrow{font-family:var(--cfa-body);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cfa-mm-green)}
  .cfa .range{position:sticky;top:0;background:var(--cfa-surface);color:var(--cfa-ink);border-bottom:1px solid var(--cfa-line);padding:10px;font-size:13px;font-family:var(--cfa-body)}
  .cfa .card{margin:14px;background:#fff;border:1px solid var(--cfa-line);border-radius:4px;padding:14px 18px;box-shadow:0 1px 3px rgba(18,43,70,.06)}
  .cfa .card h1{margin:0 0 6px;font-size:18px;font-family:var(--cfa-serif);font-weight:600;color:var(--cfa-ink);border-bottom:1px solid var(--cfa-line)}
  .cfa input[type=radio]{accent-color:var(--cfa-accent)}
  .bars{display:flex;gap:6px;align-items:flex-end;height:90px;margin-top:8px}
  .bars i{flex:1;background:#c8d2db;border-radius:2px 2px 0 0}
  .cfa .bars i{background:#8aa0b3}
</style></head>
<body>
  <h2 class="cap">Statistics screen — stock Anki (before) vs CFA design system (after)</h2>

  <div class="frame">
    <div class="tag b">Before · stock Anki</div>
    <div class="stock">
      <div class="range"><label><input type="radio" checked> Deck</label> &nbsp; <label><input type="radio"> Collection</label> &nbsp;&nbsp; <label><input type="radio" checked> 1 year</label> <label><input type="radio"> All</label></div>
      <div class="card"><h1>Today</h1><div class="bars"><i style="height:40%"></i><i style="height:70%"></i><i style="height:55%"></i><i style="height:85%"></i><i style="height:30%"></i></div></div>
      <div class="card"><h1>Future Due</h1><div class="bars"><i style="height:60%"></i><i style="height:45%"></i><i style="height:75%"></i><i style="height:35%"></i></div></div>
    </div>
  </div>

  <div class="frame">
    <div class="tag a">After · CFA design system</div>
    <div class="cfa">
      <div class="range"><label><input type="radio" checked> Deck</label> &nbsp; <label><input type="radio"> Collection</label> &nbsp;&nbsp; <label><input type="radio" checked> 1 year</label> <label><input type="radio"> All</label></div>
      <div class="head"><span class="eyebrow">ankiCFA · Level II · Study statistics</span></div>
      <div class="card"><h1>Today</h1><div class="bars"><i style="height:40%"></i><i style="height:70%"></i><i style="height:55%"></i><i style="height:85%"></i><i style="height:30%"></i></div></div>
      <div class="card"><h1>Future Due</h1><div class="bars"><i style="height:60%"></i><i style="height:45%"></i><i style="height:75%"></i><i style="height:35%"></i></div></div>
    </div>
  </div>
</body></html>
