<!doctype html><html><head><meta charset="utf-8"><style>
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#eef0f3;padding:24px;color:#1a1a1a}
  h2{font:600 13px/1 sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#68707d;margin:0 0 12px}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .panel{border-radius:8px;padding:20px;min-height:220px}
  /* BEFORE: stock Anki blue tokens */
  .before{--button-primary-bg:#3b82f6;--border-focus:#3b82f6;--fg-link:#1d4ed8;--selected-bg:rgba(147,197,253,.5);--page:#ffffff;background:#ffffff}
  /* AFTER: CFA tokens (matches DeckOptionsPage .cfa-deckopts.is-light overrides) */
  .after{--button-primary-bg:#122b46;--border-focus:#da5c01;--fg-link:#da5c01;--selected-bg:#fcebda;--page:#fafbfd;background:#fafbfd}
  .eyebrow{font:600 12px/1 sans-serif;letter-spacing:.09em;text-transform:uppercase;color:#da5c01;margin-bottom:14px}
  .sec-title{font:600 17px/1.3 Georgia,serif;color:#122b46;border-bottom:1px solid #e3e7ec;padding-bottom:6px;margin:0 0 12px}
  .row{display:flex;align-items:center;gap:10px;margin:10px 0}
  label{font-size:13px;color:#3a4553;width:150px}
  input[type=text]{padding:6px 8px;border:1px solid #cdd3da;border-radius:4px;outline:none;flex:1}
  input.focused{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--border-focus)}
  .save{background:var(--button-primary-bg);color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer}
  a{color:var(--fg-link);font-size:13px;text-decoration:none}
  .selrow{background:var(--selected-bg);border-radius:4px;padding:8px 10px;font-size:13px}
  .caption{font-size:11px;color:#939597;margin-top:10px}
</style></head><body>
<div class="wrap">
  <div class="panel before">
    <h2>Before — stock Anki</h2>
    <div class="sec-title" style="color:#1a1a1a;font-family:sans-serif">Daily Limits</div>
    <div class="row"><label>New cards/day</label><input type="text" class="focused" value="20"></div>
    <div class="selrow">Selected preset: CFA Level II</div>
    <div class="row" style="margin-top:16px"><button class="save">Save</button><a href="#">Get sharing link</a></div>
  </div>
  <div class="panel after">
    <div class="eyebrow">ankiCFA · Level II · Study settings</div>
    <h2>After — CFA design system</h2>
    <div class="sec-title">Daily Limits</div>
    <div class="row"><label>New cards/day</label><input type="text" class="focused" value="20"></div>
    <div class="selrow">Selected preset: CFA Level II</div>
    <div class="row" style="margin-top:16px"><button class="save">Save</button><a href="#">Get sharing link</a></div>
  </div>
</div>
</body></html>
